name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit toolchain
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Record toolchain versions
        run: moon version --all || moon version

      # 必須ゲート: 型チェックと JS ビルド
      - name: moon check
        run: moon check

      - name: moon build (js)
        run: moon build --target js --release

      # テスト必須ゲート
      - name: moon test
        run: moon test

      # フォーマット・インターフェースの乖離検知
      - name: moon info && moon fmt (drift check)
        run: |
          moon info
          moon fmt
          git diff --exit-code || echo "::warning::moon info/fmt produced diffs — run them locally and commit"
        continue-on-error: true

      - name: Node smoke test (parse_to_json / parse_to_html)
        run: |
          node --input-type=module -e "
          import { parse_to_json, parse_to_html, get_version } from './_build/js/release/build/chord_language.js';
          const r = JSON.parse(parse_to_json('1 3m7 4M7 5 | b7 1'));
          if (!r.success || r.data.lines.length !== 1) { throw new Error('smoke test failed'); }
          const c = JSON.parse(parse_to_json('1@red'));
          if (c.data.lines[0].tokens[0].chord.color !== 'red') { throw new Error('color smoke test failed'); }
          const fm = JSON.parse(parse_to_json('---\nkey: G\n---\n1 4 5'));
          if (fm.data.meta.key !== 'G') { throw new Error('frontmatter smoke test failed'); }
          const err = JSON.parse(parse_to_json('1 4\n8x'));
          if (err.success || err.errors[0].kind !== 'InvalidDegree' || err.errors[0].line !== 2) { throw new Error('error smoke test failed'); }
          const html = parse_to_html('1 3m7\n8x');
          if (!html.includes('chord-error') || !html.includes('IIIm7')) { throw new Error('partial render smoke test failed'); }
          console.log('smoke OK, version', get_version());
          "
