<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>chord-language preview</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem; max-width: 960px; margin-inline: auto; }
  h1 { font-size: 1rem; opacity: .7; }
  .pane { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 720px) { .pane { grid-template-columns: 1fr; } }
  textarea { width: 100%; min-height: 16rem; font-family: ui-monospace, Menlo, monospace; font-size: .95rem; padding: .6rem; box-sizing: border-box; }
  #out { border: 1px solid #8884; border-radius: 6px; padding: .75rem; min-height: 16rem; }
  .hint { font-size: .8rem; opacity: .6; }
</style>
</head>
<body>
<h1>chord-language 開発用プレビュー</h1>
<p class="hint">
  リポジトリルートで <code>moon build --target js && python3 -m http.server 8080</code> を実行し、
  <code>http://localhost:8080/tools/preview.html</code> を開く。CSS レイアウトの反復確認用（docs/roadmap.md Phase 2 参照）。
</p>
<div class="pane">
  <textarea id="src" spellcheck="false">1 3m7 4M7 5 | b7 1
s4M7(b5,b9,s11)@red 5 |
2m7(b5) 5(b9)@blue 1M7(sus4,9)@green</textarea>
  <div id="out"></div>
</div>
<script type="module">
  import { parse_to_html, chord_css } from '../_build/js/release/build/chord_language.js';

  const style = document.createElement('style');
  style.textContent = chord_css();
  document.head.appendChild(style);

  const src = document.getElementById('src');
  const out = document.getElementById('out');
  const render = () => { out.innerHTML = parse_to_html(src.value); };
  src.addEventListener('input', render);
  render();
</script>
</body>
</html>
